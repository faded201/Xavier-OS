<style>

/* 🌌 RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

/* 🌑 DARK WORLD */
body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* 📜 SCRIPTURE */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("https://i.imgur.com/8IuucQZ.png");
  opacity:.05;
  animation:moveScript 120s linear infinite;
}

/* 🕯️ LIGHT FOLLOW */
.scripture-glow{
  position:fixed;
  inset:0;
  pointer-events:none;
  mix-blend-mode:screen;
  background:
    radial-gradient(circle at var(--x,50%) var(--y,50%),
    rgba(255,180,90,0.25),
    transparent 300px);
}

/* 📖 BOOK GRID */
#rows{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding-bottom:100px;
}

/* 📖 BOOK */
.book{
  width:160px;
  height:200px;
  perspective:800px;
  margin:15px;
}

.book-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1s;
}

.book.open .book-inner{
  transform:rotateY(-140deg);
}

/* 📄 PAGES */
.page{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(#222,#111);
  border-radius:10px;
  box-shadow:0 0 15px orange;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px;
  font-size:14px;
  backface-visibility:hidden;
}

.page.back{
  transform:rotateY(180deg);
}

/* ✨ PARTICLES */
.particles{
  position:absolute;
  width:100%;
  height:100%;
}

.particle{
  position:absolute;
  width:5px;
  height:5px;
  background:orange;
  border-radius:50%;
  animation:rise 3s linear;
}

@keyframes rise{
  to{transform:translateY(-150px);opacity:0}
}

/* 🧿 RUNES */
.rune{
  position:fixed;
  opacity:.1;
  font-size:22px;
  animation:floatRune 20s linear infinite;
}

@keyframes floatRune{
  0%{transform:translateY(100vh)}
  100%{transform:translateY(-10vh)}
}

/* 🧠 UI */
h1{text-align:center;margin:20px}

#stats{
  text-align:center;
  margin-bottom:10px;
  font-size:14px;
  color:#ffd27a;
  text-shadow:0 0 10px orange;
}

button{
  padding:10px;
  margin:5px;
}

</style>

<div class="scripture-glow"></div>
