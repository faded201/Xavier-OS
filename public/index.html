<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xavier Cinematic OS</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<canvas id="fireflies"></canvas>

<h1>🎬 Xavier Cinematic OS</h1>

<!-- 🎬 Scene -->
<img id="sceneImage">

<!-- 💬 Subtitles -->
<div id="subtitles"></div>

<!-- 📚 Books -->
<div id="rows"></div>

<audio id="audio"></audio>
<canvas id="visualizer"></canvas>

<script>

/* 📚 STORY ENGINE */
const books = {
  vampire: {
    title: "My Vampire System",
    genre: "Main",
    scenes: [
      {
        text: "The night was silent... until Quinn felt the hunger awaken.",
        img: "https://picsum.photos/800/400?random=1"
      },
      {
        text: "A system appeared before his eyes... power beyond imagination.",
        img: "https://picsum.photos/800/400?random=2"
      },
      {
        text: "This was only the beginning.",
        img: "https://picsum.photos/800/400?random=3"
      }
    ]
  }
};

/* 🎴 UI */
const rows = document.getElementById("rows");

Object.keys(books).forEach(key=>{
  const card = document.createElement("div");
  card.className="card";
  card.innerText = books[key].title;
  card.onclick = ()=>playStory(key);
  rows.appendChild(card);
});

/* 🎤 VOICE SYSTEM */
const synth = window.speechSynthesis;

/* 🎬 PLAY STORY */
const img = document.getElementById("sceneImage");
const sub = document.getElementById("subtitles");

function playStory(key){

  const story = books[key].scenes;
  let i = 0;

  function nextScene(){

    if(i >= story.length) return;

    let scene = story[i];

    img.src = scene.img;
    sub.innerText = scene.text;

    let utter = new SpeechSynthesisUtterance(scene.text);

    /* 🎭 OPTIONAL: different voices */
    let voices = synth.getVoices();
    if(voices.length) utter.voice = voices[i % voices.length];

    utter.onend = ()=>{
      i++;
      setTimeout(nextScene, 1000);
    };

    synth.speak(utter);
  }

  nextScene();
}

/* 🔥 Fireflies */
const canvas = document.getElementById("fireflies");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let p = Array.from({length:60},()=>({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height
}));

function anim(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  p.forEach(pt=>{
    pt.x += Math.random()-0.5;
    pt.y += Math.random()-0.5;
    ctx.beginPath();
    ctx.arc(pt.x,pt.y,2,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });
  requestAnimationFrame(anim);
}
anim();

</script>

</body>
</html>
