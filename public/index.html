<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cinematic Audiobooks</title>

<style>

/* 🌌 GLOBAL */
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  color: white;
  overflow-x: hidden;

  background:
    radial-gradient(circle at 20% 30%, #1a1f4b, transparent),
    radial-gradient(circle at 80% 70%, #4b1a3a, transparent),
    radial-gradient(circle at center, #050510, #000000);

  background-size: 200% 200%;
  animation: backgroundShift 15s ease infinite;
}

@keyframes backgroundShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ✨ MAGIC ROTATION */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;

  background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
  animation: rotateMagic 40s linear infinite;
}

@keyframes rotateMagic {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* 🌌 HOLOGRAPHIC LIGHT */
body::after {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;

  background: linear-gradient(
    120deg,
    transparent,
    rgba(120,180,255,0.08),
    transparent,
    rgba(200,120,255,0.08),
    transparent
  );

  animation: holoSweep 12s linear infinite;
}

@keyframes holoSweep {
  0% { transform: rotate(0deg) translateX(-20%); }
  100% { transform: rotate(360deg) translateX(20%); }
}

/* 🔥 FIRELIGHT */
.fire-glow {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 200px;
  background: radial-gradient(circle, rgba(255,140,50,0.25), transparent);
}

/* 🌟 RUNES */
.rune {
  position: fixed;
  font-size: 22px;
  opacity: 0.12;
  animation: floatRune 25s linear infinite;
}

@keyframes floatRune {
  0% { transform: translateY(100vh) rotate(0deg); }
  100% { transform: translateY(-10vh) rotate(360deg); }
}

/* 🔥 CANVAS */
#fireflies {
  position: fixed;
  width: 100%;
  height: 100%;
}

/* 🎬 TITLE */
h1 {
  text-align: center;
  font-size: 32px;

  background: linear-gradient(90deg,#6df,#c8f,#6df);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: holoFlow 5s linear infinite;
}

@keyframes holoFlow {
  0% { background-position: 0% }
  100% { background-position: 200% }
}

/* 🎥 SCENE */
#sceneImage {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

/* 💬 SUBTITLES */
#subtitles {
  position: fixed;
  bottom: 100px;
  width: 100%;
  text-align: center;
  background: rgba(0,0,0,0.6);
  padding: 10px;
}

/* 📚 GRID */
#rows {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* 🔮 HOLOGRAPHIC CARDS */
.card {
  margin: 15px;
  padding: 20px;
  width: 85%;
  max-width: 400px;

  border-radius: 20px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);

  border: 1px solid rgba(255,255,255,0.2);

  text-align: center;
  cursor: pointer;

  transition: 0.3s;

  box-shadow:
    0 0 10px rgba(120,150,255,0.2);
}

/* ✨ POWER HOVER */
.card:hover {
  transform: scale(1.06);

  box-shadow:
    0 0 25px rgba(120,180,255,0.7),
    0 0 50px rgba(200,120,255,0.5);
}

</style>
</head>

<body>

<canvas id="fireflies"></canvas>
<div class="fire-glow"></div>

<div class="rune" style="left:10%">✧</div>
<div class="rune" style="left:40%">𓂀</div>
<div class="rune" style="left:70%">⚚</div>

<h1>🎧 Cinematic Audiobooks</h1>

<img id="sceneImage">
<div id="subtitles"></div>
<div id="rows"></div>

<script>

/* 🎧 MUSIC */
const music = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_7c1b9c3c6e.mp3");
music.loop = true;
music.volume = 0.3;

/* 🎤 VOICE */
function getVoice() {
  return speechSynthesis.getVoices()[0];
}

/* 📚 BOOKS */
const books = {
  vampire: { title: "My Vampire System" },
  dragonic: { title: "My Dragonic System" },
  demonic: { title: "Birth of a Demonic Sword" },
  beast: { title: "Legendary Beast Tamer" },
  dragonInside: { title: "The Dragon Inside Me" },
  godsEye: { title: "Gods Eye" },
  vikings: { title: "Vikings: Valhalla Into the After" }
};

/* 🎴 BUILD UI */
const rows = document.getElementById("rows");

Object.keys(books).forEach(key=>{
  const card = document.createElement("div");
  card.className="card";
  card.innerText = books[key].title;
  card.onclick = ()=>playBook(books[key].title);
  rows.appendChild(card);
});

/* 🎬 PLAYER */
const img = document.getElementById("sceneImage");
const sub = document.getElementById("subtitles");

function playBook(title){

  music.play();

  function next(){

    const text = title + ": A powerful moment unfolds...";
    img.src = "https://picsum.photos/800/400?random=" + Math.random();

    sub.innerText = text;

    const u = new SpeechSynthesisUtterance(text);
    u.voice = getVoice();

    u.onend = ()=>setTimeout(next, 800);

    speechSynthesis.speak(u);
  }

  next();
}

/* ✨ FIREflies (OPTIMISED) */
const canvas = document.getElementById("fireflies");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 40; i++) {
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2+1,
    dx:(Math.random()-0.5)*0.3,
    dy:(Math.random()-0.5)*0.3
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    ctx.fillStyle="rgba(255,240,180,0.8)";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r*2,0,Math.PI*2);
    ctx.fill();

    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width)p.dx*=-1;
    if(p.y<0||p.y>canvas.height)p.dy*=-1;
  });

  requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
