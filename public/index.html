<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🌌 System Awakening: Big Bang</title>

<style>

/* 🌌 CINEMATIC BACKGROUND */
body {
  margin:0;
  font-family:sans-serif;
  color:white;
  overflow-x:hidden;

  background:
    radial-gradient(circle at 20% 30%, #1a1f4b, transparent),
    radial-gradient(circle at 80% 70%, #4b1a3a, transparent),
    radial-gradient(circle at center, #050510, #000);

  background-size:200% 200%;
  animation:bgShift 15s infinite;
}
@keyframes bgShift {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* ✨ ROTATION GLOW */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;
  background:radial-gradient(circle, rgba(255,255,255,0.08), transparent);
  animation:rotate 40s linear infinite;
}
@keyframes rotate{to{transform:rotate(360deg)}}

/* 🎧 TITLE */
h1{text-align:center}

/* 🎬 SCENE */
#sceneImage{width:100%;height:220px;object-fit:cover}

/* 💬 SUBTITLES */
#subtitles{
  position:fixed;
  bottom:90px;
  width:100%;
  text-align:center;
  background:rgba(0,0,0,0.6);
}

/* 🎮 UI */
#playerStats{text-align:center;margin:10px}

#rows,#cardCollection,#market{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

/* 🎴 CARD */
.card{
  margin:10px;
  padding:15px;
  width:160px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  text-align:center;
}

/* 🌈 RARITY */
.common{border:2px solid gray}
.uncommon{border:2px solid green}
.rare{border:2px solid blue}
.epic{border:2px solid purple}
.legendary{border:2px solid gold}
.mythical{
  border:2px solid red;
  box-shadow:0 0 20px red,0 0 50px red;
}

/* 💥 FLASH */
#flash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
}

/* 🎁 PACK MODAL */
#pack{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:black;
  padding:30px;
  border-radius:20px;
  text-align:center;
  transition:0.3s;
}
#pack.show{transform:translate(-50%,-50%) scale(1)}

#revealCard{
  width:200px;
  height:260px;
  background:#111;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  transform:rotateY(90deg);
  transition:0.6s;
}
#revealCard.show{transform:rotateY(0)}

button{margin:5px;padding:8px}

</style>
</head>

<body>

<h1>🌌 System Awakening</h1>

<div id="playerStats"></div>

<button onclick="addXP(25)">⚡ XP</button>
<button onclick="unlockReward()">🎁 Pack</button>

<h2>📚 Audiobooks</h2>
<div id="rows"></div>

<img id="sceneImage">
<div id="subtitles"></div>

<h2>🃏 Cards</h2>
<div id="cardCollection"></div>

<h2>🛒 Market</h2>
<div id="market"></div>

<div id="flash"></div>

<div id="pack">
  <h2>Opening...</h2>
  <div id="revealCard"></div>
</div>

<script>

// 🎧 AUDIO
const music=new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_7c1b9c3c6e.mp3");
music.loop=true;

// 📚 BOOKS
const books=["Vampire","Dragonic","Demonic","Beast","Gods Eye"];
const rows=document.getElementById("rows");

books.forEach(t=>{
  let d=document.createElement("div");
  d.className="card";
  d.innerText=t;
  d.onclick=()=>playBook(t);
  rows.appendChild(d);
});

// 🎮 PLAYER
let player={level:1,xp:0,coins:100,inventory:[]};
let market=[];

// 💾 SAVE
function save(){localStorage.setItem("p",JSON.stringify(player))}
function load(){let d=localStorage.getItem("p");if(d)player=JSON.parse(d)}
load();

// 🌈 RARITY
const mult={common:1,uncommon:1.5,rare:2,epic:4,legendary:8,mythical:15};

// ⚡ XP
function addXP(x){
  player.xp+=x;
  if(player.xp>=player.level*50){
    player.xp=0;
    player.level++;
    unlockReward();
  }
  save();render();
}

// 🎲 DROP
function drop(){
  let r=Math.random();
  if(r<0.4)return{name:"Strength",rarity:"common"};
  if(r<0.65)return{name:"Instinct",rarity:"uncommon"};
  if(r<0.85)return{name:"Dragon Flame",rarity:"rare"};
  if(r<0.95)return{name:"Shadow Step",rarity:"epic"};
  if(r<0.995)return{name:"God Vision",rarity:"legendary"};
  return{name:"MYTHIC CORE",rarity:"mythical"};
}

// 💥 FX
function flash(){
  let f=document.getElementById("flash");
  f.style.opacity=1;
  setTimeout(()=>f.style.opacity=0,200);
}
function shake(){
  document.body.style.transform="translate(5px)";
  setTimeout(()=>document.body.style.transform="translate(-5px)",50);
  setTimeout(()=>document.body.style.transform="translate(0)",100);
}

// 🎁 PACK
function unlockReward(){

  let r=drop();
  let pack=document.getElementById("pack");
  let card=document.getElementById("revealCard");

  pack.classList.add("show");
  card.className="";
  card.innerHTML="";

  setTimeout(()=>{flash();shake()},200);

  setTimeout(()=>{
    card.classList.add("show",r.rarity);
    card.innerHTML=`<div><h3>${r.name}</h3><p>${r.rarity}</p></div>`;

    if(r.rarity==="mythical"){
      flash();shake();
      alert("🔥 MYTHICAL DROP 🔥");
    }

    player.inventory.push({...r,level:1,id:Date.now()});
    render();

  },700);

  setTimeout(()=>pack.classList.remove("show"),2200);
}

// 💪 POWER
function power(){
  let p=player.level;
  player.inventory.forEach(c=>p+=c.level*2);
  return p;
}

// 💰 VALUE
function value(c){
  return Math.floor(10*mult[c.rarity]*c.level*(power()/10));
}

// 🛒 MARKET
function sell(id){
  let c=player.inventory.find(x=>x.id===id);
  market.push({...c,price:value(c)});
  player.inventory=player.inventory.filter(x=>x.id!==id);
  render();
}
function buy(id){
  let c=market.find(x=>x.id===id);
  if(player.coins>=c.price){
    player.coins-=c.price;
    player.inventory.push(c);
    market=market.filter(x=>x.id!==id);
  }
  render();
}

// 🎬 PLAYER
const img=document.getElementById("sceneImage");
const sub=document.getElementById("subtitles");

function playBook(title){
  music.play();

  function next(){
    addXP(10);
    img.src="https://picsum.photos/800/400?"+Math.random();
    sub.innerText=title+"... power rising";

    let u=new SpeechSynthesisUtterance(sub.innerText);
    speechSynthesis.speak(u);
    u.onend=()=>setTimeout(next,800);
  }
  next();
}

// 🎨 RENDER
function render(){

  document.getElementById("playerStats").innerHTML=
    `🔥 Lv.${player.level} | XP ${player.xp} | ⚡ ${power()} | 💰 ${player.coins}`;

  let col=document.getElementById("cardCollection");
  col.innerHTML="";
  player.inventory.forEach(c=>{
    let d=document.createElement("div");
    d.className="card "+c.rarity;
    d.innerHTML=`<b>${c.name}</b><p>${c.rarity}</p><button onclick="sell(${c.id})">Sell</button>`;
    col.appendChild(d);
  });

  let m=document.getElementById("market");
  m.innerHTML="";
  market.forEach(c=>{
    let d=document.createElement("div");
    d.className="card "+c.rarity;
    d.innerHTML=`<b>${c.name}</b><p>💰 ${c.price}</p><button onclick="buy(${c.id})">Buy</button>`;
    m.appendChild(d);
  });

  save();
}

render();

</script>

</body>
</html>
