<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🌌 System Awakening: Ancient Core</title>

<style>

/* 🌌 RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

/* 🌑 DARK ANCIENT BACKGROUND */
body{
  color:white;
  overflow-x:hidden;

  background: radial-gradient(circle,#0a0a0f,#020203);
}

/* 📜 SCRIPTURE TEXTURE */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("https://i.imgur.com/8IuucQZ.png");
  background-size:cover;
  opacity:0.06;
  animation:moveScript 80s linear infinite;
}

/* 🕯️ CANDLE LIGHT */
body::after{
  content:"";
  position:fixed;
  inset:0;

  background:
    radial-gradient(circle at 20% 30%, rgba(255,170,90,0.2), transparent 30%),
    radial-gradient(circle at 70% 60%, rgba(255,120,60,0.15), transparent 40%);

  filter:blur(60px);
  animation:lightMove 25s infinite alternate;
}

@keyframes lightMove{
  0%{transform:translate(0,0)}
  50%{transform:translate(-100px,50px)}
  100%{transform:translate(100px,-80px)}
}

@keyframes moveScript{
  0%{background-position:0 0}
  100%{background-position:100% 100%}
}

/* 🎧 TITLE */
h1{
  text-align:center;
  padding:20px;
  color:#f5e6c8;
  text-shadow:0 0 15px rgba(255,170,90,0.6);
}

/* 🎬 SCENE */
#sceneImage{width:100%;height:220px;object-fit:cover}

/* 💬 SUBTITLES */
#subtitles{
  position:fixed;
  bottom:90px;
  width:100%;
  text-align:center;
  background:rgba(0,0,0,0.6);
}

/* 🎮 UI */
#playerStats{text-align:center;margin:10px}

#rows,#cardCollection,#market{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

/* 🎴 CARD */
.card{
  position:relative;
  margin:10px;
  padding:15px;
  width:160px;
  border-radius:15px;

  background:rgba(40,30,20,0.6);
  border:1px solid rgba(255,200,120,0.2);

  text-align:center;

  box-shadow:0 0 10px rgba(255,140,60,0.2);
}

/* 🔥 HOVER */
.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(255,170,90,0.7);
}

/* 🌈 RARITY */
.common{border:2px solid gray}
.uncommon{border:2px solid green}
.rare{border:2px solid blue}
.epic{border:2px solid purple}
.legendary{border:2px solid gold}
.mythical{
  border:2px solid red;
  box-shadow:0 0 20px red,0 0 60px red;
}

/* ✨ PARTICLES */
.particles{
  position:absolute;
  left:50%;
  bottom:5px;
  transform:translateX(-50%);
  width:150px;
  height:150px;
  pointer-events:none;
}

.particle{
  position:absolute;
  bottom:0;
  width:5px;
  height:5px;
  border-radius:50%;
  background:radial-gradient(circle,#ffd27a,#ff9a3c);
  opacity:0;
  animation:rise linear forwards;
}

@keyframes rise{
  0%{transform:translateY(0) scale(.5);opacity:0}
  20%{opacity:1}
  100%{
    transform:translateY(-140px) translateX(var(--drift)) scale(1.2);
    opacity:0;
  }
}

/* 🔥 FIRE FLOOR */
.fire-glow{
  position:fixed;
  bottom:0;
  width:100%;
  height:200px;
  background:radial-gradient(circle,rgba(255,120,40,0.3),transparent);
}

/* 🧿 RUNES */
.rune{
  position:fixed;
  font-size:22px;
  opacity:.12;
  color:#ffc46b;
  animation:floatRune 25s linear infinite;
}

@keyframes floatRune{
  0%{transform:translateY(100vh)}
  100%{transform:translateY(-10vh)}
}

/* 💥 FLASH */
#flash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
}

/* 🎁 PACK */
#pack{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:black;
  padding:30px;
  border-radius:20px;
  text-align:center;
  transition:.3s;
}
#pack.show{transform:translate(-50%,-50%) scale(1)}

#revealCard{
  width:200px;
  height:260px;
  background:#111;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  transform:rotateY(90deg);
  transition:.6s;
}
#revealCard.show{transform:rotateY(0)}

button{margin:5px;padding:8px}

</style>
</head>

<body>

<h1>📜 System Awakening</h1>

<div id="playerStats"></div>

<button onclick="addXP(25)">⚡ XP</button>
<button onclick="unlockReward()">🎁 Pack</button>

<h2>📚 Audiobooks</h2>
<div id="rows"></div>

<img id="sceneImage">
<div id="subtitles"></div>

<h2>🃏 Cards</h2>
<div id="cardCollection"></div>

<h2>🛒 Market</h2>
<div id="market"></div>

<div id="flash"></div>
<div class="fire-glow"></div>

<div class="rune" style="left:10%">𓂀</div>
<div class="rune" style="left:40%">✶</div>
<div class="rune" style="left:70%">א</div>

<div id="pack">
  <h2>Opening...</h2>
  <div id="revealCard"></div>
</div>

<script>

/* ✨ PARTICLE ENGINE */
function spawnParticles(el){
  const container=document.createElement("div");
  container.className="particles";
  el.appendChild(container);

  setInterval(()=>{
    const p=document.createElement("div");
    p.className="particle";

    const drift=(Math.random()-0.5)*80;
    p.style.setProperty("--drift",drift+"px");
    p.style.left=Math.random()*100+"%";
    p.style.animationDuration=(2+Math.random()*2)+"s";

    container.appendChild(p);
    setTimeout(()=>p.remove(),4000);
  },150);
}

// 🎧 AUDIO
const music=new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_7c1b9c3c6e.mp3");
music.loop=true;

// 📚 BOOKS
const books=["Vampire","Dragonic","Demonic","Beast","Gods Eye"];
const rows=document.getElementById("rows");

books.forEach(t=>{
  let d=document.createElement("div");
  d.className="card";
  d.innerText=t;
  d.onclick=()=>playBook(t);
  rows.appendChild(d);

  spawnParticles(d); // ✨ MAGIC HERE
});

// 🎮 PLAYER
let player={level:1,xp:0,coins:100,inventory:[]};
let market=[];
