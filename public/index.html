<script>

/* 🎭 VOICE HELPER */
function getVoice(type) {
  const voices = speechSynthesis.getVoices();

  if (!voices.length) return null;

  if (type === "male") {
    return voices.find(v => v.name.toLowerCase().includes("male")) || voices[0];
  }

  if (type === "female") {
    return voices.find(v => v.name.toLowerCase().includes("female")) || voices[1];
  }

  return voices[0];
}

/* 🎴 BUILD UI */
const rows = document.getElementById("rows");

Object.keys(books).forEach(key => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerText = books[key].title;

  card.onclick = () => playBook(key);

  rows.appendChild(card);
});

/* 🎬 PLAYER */
const img = document.getElementById("sceneImage");
const sub = document.getElementById("subtitles");

function playBook(key){

  speechSynthesis.cancel();

  const scenes = books[key].scenes;
  let i = 0;

  function next(){

    if(i >= scenes.length) return;

    let s = scenes[i];

    img.src = s.img;
    sub.innerText = s.char.toUpperCase() + ": " + s.text;

    let u = new SpeechSynthesisUtterance(s.text);
    u.voice = getVoice(s.voice);

    u.onend = ()=>{
      i++;
      setTimeout(next, 800);
    };

    speechSynthesis.speak(u);
  }

  next();
}

</script>
