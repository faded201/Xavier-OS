<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA + iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Xavier OS">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <link rel="stylesheet" href="styles.css">

    <title>Xavier OS</title>
</head>

<body>

    <!-- 🔥 Fireflies Canvas (MUST be here) -->
    <canvas id="fireflies"></canvas>

    <h1 style="text-align:center;">🎧 Xavier OS Audiobooks</h1>

    <div class="audiobook-container">

        <div class="audiobook-card series-my-vampire-system">
            <div class="audiobook-title">My Vampire System</div>
            <div class="audiobook-series">Quinn Talen Universe</div>
            <button class="audiobook-button" onclick="playBook('vampire')">▶ Play</button>
        </div>

        <div class="audiobook-card series-my-dragonic-system">
            <div class="audiobook-title">My Dragonic System</div>
            <div class="audiobook-series">Dragon Saga</div>
            <button class="audiobook-button" onclick="playBook('dragon')">▶ Play</button>
        </div>

        <div class="audiobook-card series-shadow-blade">
            <div class="audiobook-title">Shadow Blade</div>
            <div class="audiobook-series">Dark Assassin Series</div>
            <button class="audiobook-button" onclick="playBook('shadow')">▶ Play</button>
        </div>

    </div>

    <!-- 🔥 Fireflies Script (ALWAYS at bottom) -->
    <script>
    const canvas = document.getElementById("fireflies");
    const ctx = canvas.getContext("2d");

    let particles = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    class Firefly {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.radius = Math.random() * 2 + 1;
            this.speedX = (Math.random() - 0.5) * 0.5;
            this.speedY = (Math.random() - 0.5) * 0.5;
            this.opacity = Math.random();
        }

        update() {
            this.x += this.speedX;
            this.y += this.speedY;

            this.opacity += (Math.random() - 0.5) * 0.05;
            this.opacity = Math.max(0.2, Math.min(this.opacity, 1));

            if (this.x < 0) this.x = canvas.width;
            if (this.x > canvas.width) this.x = 0;
            if (this.y < 0) this.y = canvas.height;
            if (this.y > canvas.height) this.y = 0;
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 200, ${this.opacity})`;
            ctx.shadowColor = "rgba(255,255,150,0.8)";
            ctx.shadowBlur = 10;
            ctx.fill();
        }
    }

    function init() {
        particles = [];
        for (let i = 0; i < 80; i++) {
            particles.push(new Firefly());
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(animate);
    }

    init();
    animate();
    </script>

</body>
</html>
