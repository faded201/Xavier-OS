<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xavier OS</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<canvas id="fireflies"></canvas>

<h1>🎧 Xavier OS Audiobooks</h1>

<div class="audiobook-container">

    <div class="audiobook-card" onclick="playBook('audio1.mp3')">
        <div class="audiobook-title">My Vampire System</div>
        <div class="audiobook-series">Tap to Play</div>
    </div>

    <div class="audiobook-card" onclick="playBook('audio2.mp3')">
        <div class="audiobook-title">My Dragonic System</div>
        <div class="audiobook-series">Tap to Play</div>
    </div>

</div>

<!-- 🎧 Hidden Audio -->
<audio id="audio"></audio>

<!-- 📊 Visualizer -->
<canvas id="visualizer"></canvas>

<script>
const audio = document.getElementById("audio");
const visCanvas = document.getElementById("visualizer");
const visCtx = visCanvas.getContext("2d");

let audioCtx, analyser, source, dataArray;

function setupAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();

    source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    analyser.fftSize = 128;
    const bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);
}

function playBook(file) {
    if (!audioCtx) setupAudio();

    audio.src = file;
    audio.play();
}

/* 📊 Visualizer */
function drawVisualizer() {
    requestAnimationFrame(drawVisualizer);

    if (!analyser) return;

    analyser.getByteFrequencyData(dataArray);

    visCanvas.width = window.innerWidth;
    visCanvas.height = 100;

    visCtx.clearRect(0, 0, visCanvas.width, visCanvas.height);

    let barWidth = (visCanvas.width / dataArray.length);

    for (let i = 0; i < dataArray.length; i++) {
        let height = dataArray[i];

        visCtx.fillStyle = "rgba(100,200,255,0.6)";
        visCtx.fillRect(i * barWidth, visCanvas.height - height, barWidth - 2, height);
    }

    audioBoost = 1 + (Math.max(...dataArray) / 255);
}

drawVisualizer();

/* 🔥 Fireflies */
const canvas = document.getElementById("fireflies");
const ctx = canvas.getContext("2d");

let particles = [];
let audioBoost = 1;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

class Firefly {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = (Math.random() - 0.5) * 0.5;
    }

    update() {
        this.x += this.speedX * audioBoost;
        this.y += this.speedY * audioBoost;

        if (this.x < 0) this.x = canvas.width;
        if (this.x > canvas.width) this.x = 0;
        if (this.y < 0) this.y = canvas.height;
        if (this.y > canvas.height) this.y = 0;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2 * audioBoost, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,200,0.8)";
        ctx.shadowBlur = 20;
        ctx.fill();
    }
}

for (let i = 0; i < 80; i++) {
    particles.push(new Firefly());
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        p.update();
        p.draw();
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
