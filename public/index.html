<script>

/* 🎧 AUDIO SYSTEM */
const bgMusic = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_7c1b9c3c6e.mp3");
bgMusic.loop = true;
bgMusic.volume = 0.3;

const sfx = {
  boom: new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_49c6d0a3c7.mp3"),
  magic: new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_6e8b4c4a0e.mp3")
};

/* 🎤 VOICE */
function getVoice(type) {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return null;

  return type === "female"
    ? voices.find(v => v.name.toLowerCase().includes("female")) || voices[1]
    : voices.find(v => v.name.toLowerCase().includes("male")) || voices[0];
}

/* 🧠 AI STORY GENERATOR (LOCAL SIMULATION) */
function generateScene(bookTitle) {

  const events = [
    "A shadow moved in the distance.",
    "Power surged through his body.",
    "A mysterious voice whispered.",
    "The ground shattered beneath him.",
    "A new enemy appeared.",
    "Time itself slowed down."
  ];

  const chars = ["narrator","hero","system","enemy"];
  const voices = ["male","female"];

  return {
    char: chars[Math.floor(Math.random()*chars.length)],
    voice: voices[Math.floor(Math.random()*voices.length)],
    text: `${bookTitle}: ${events[Math.floor(Math.random()*events.length)]}`,
    img: `https://picsum.photos/800/400?random=${Math.random()*1000}`
  };
}

/* 📚 BOOKS */
const books = {
  vampire: { title: "My Vampire System" },
  dragonic: { title: "My Dragonic System" },
  demonic: { title: "Birth of a Demonic Sword" },
  beast: { title: "Legendary Beast Tamer" },
  dragonInside: { title: "The Dragon Inside Me" },
  godsEye: { title: "Gods Eye" },
  vikings: { title: "Vikings: Valhalla Into the After" }
};

/* 🎴 UI */
const rows = document.getElementById("rows");

Object.keys(books).forEach(key=>{
  const card = document.createElement("div");
  card.className="card";
  card.innerText = books[key].title;

  card.onclick = ()=>startCinematic(key);

  rows.appendChild(card);
});

/* 🎬 PLAYER */
const img = document.getElementById("sceneImage");
const sub = document.getElementById("subtitles");

function startCinematic(key){

  speechSynthesis.cancel();
  bgMusic.play();

  let count = 0;

  function next(){

    if(count > 20) return; // length of session

    let scene = generateScene(books[key].title);

    img.src = scene.img;
    sub.innerText = scene.char.toUpperCase() + ": " + scene.text;

    /* 🎧 RANDOM SOUND FX */
    if(Math.random() > 0.7){
      sfx.magic.currentTime = 0;
      sfx.magic.play();
    }

    if(Math.random() > 0.85){
      sfx.boom.currentTime = 0;
      sfx.boom.play();
    }

    let u = new SpeechSynthesisUtterance(scene.text);
    u.voice = getVoice(scene.voice);

    u.onend = ()=>{
      count++;
      setTimeout(next, 700);
    };

    speechSynthesis.speak(u);
  }

  next();
}

</script>
