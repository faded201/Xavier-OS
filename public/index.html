<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA + iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Xavier OS">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <title>Xavier OS</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(180deg, #282c34, #0b0c0e);
            overflow: hidden;
            color: white;
            font-family: system-ui, sans-serif;
        }

        .container {
            text-align: center;
        }

        .player {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .button {
            background: #61dafb;
            border: none;
            border-radius: 10px;
            padding: 12px 20px;
            margin: 5px;
            color: black;
            cursor: pointer;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="player">
            <h1>🎧 Xavier OS Audiobook</h1>

            <audio id="audioPlayer" preload="none">
                <source src="your-audiobook-url.mp3" type="audio/mpeg">
            </audio>

            <div>
                <button class="button" onclick="playAudio()">Play</button>
                <button class="button" onclick="pauseAudio()">Pause</button>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById("audioPlayer");

        function playAudio() {
            audio.play();
        }

        function pauseAudio() {
            audio.pause();
        }
    </script>
</body>
</html>
