<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Audiobook Player</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(180deg, #282c34, #0b0c0e);
            overflow: hidden;
            color: white;
            font-family: Arial, sans-serif;
        }
        .container {
            position: relative;
            text-align: center;
        }
        .player {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .button {
            background: #61dafb;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            color: black;
            cursor: pointer;
            transition: background 0.3s;
        }
        .button:hover {
            background: #21a1f1;
        }
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="particles"></div>
    <div class="container">
        <div class="player">
            <h1>Audiobook Player - Featuring Quinn Talen</h1>
            <audio controls>
                <source src="your-audiobook-url.mp3" type="audio/mpeg">
                Your browser does not support the audio tag.
            </audio>
            <div>
                <button class="button">Play</button>
                <button class="button">Pause</button>
            </div>
        </div>
    </div>
    <script>
        // Floating particles animation
        particlesJS.load('particles', 'particles.json', function() {
            console.log('callback - particles.js config loaded');
        });
    </script>
</body>
</html>
