<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xavier-OS | Heavenly Library</title>
  <style>
    /* =========================
       🌌 RESET & BACKGROUND
    ========================= */
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Cinzel', serif, sans-serif; }
    
    body {
      color:white;
      overflow-x:hidden;
      background: radial-gradient(circle at center,#0a0a0f,#020203);
      min-height: 100vh;
    }

    body::before {
      content:""; position:fixed; inset:0;
      background:url("https://i.imgur.com/8IuucQZ.png");
      opacity:.05; animation:moveScript 120s linear infinite; pointer-events:none;
    }

    @keyframes moveScript { to { background-position:100% 100%; } }

    /* =========================
       📚 GRID & UI
    ========================= */
    #rows { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; padding:40px 20px; }
    
    h1 { text-align:center; padding-top:40px; color:#f5e6c8; text-shadow:0 0 20px rgba(255,160,80,0.7); }
    
    #stats { text-align:center; padding:10px; font-size:14px; color:#ffc46b; text-shadow:0 0 12px rgba(255,180,80,0.6); }

    /* =========================
       💀 THE DEAD STATE (Resource Saver)
    ========================= */
    .book {
      position:relative; width:180px; height:270px;
      border-radius:12px; cursor:pointer; transition:all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      overflow:hidden;
    }

    .book.dead {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }

    /* Shimmer Effect for Dead Books */
    .placeholder {
      width:70%; height:60%; border-radius:8px;
      background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.15), rgba(255,255,255,0.05));
      background-size: 200% 100%; animation: shimmer 2s infinite;
    }

    @keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }

    .book-title { margin-top:15px; font-size:13px; color:#aaa; text-align:center; padding:0 10px; }

    /* =========================
       🔥 THE ALIVE STATE (Activated)
    ========================= */
    .book.active {
      background: #1a1510;
      border: 1.5px solid #ffd700;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
      transform: scale(1.05);
    }

    .book-cover { width:100%; height:100%; position:absolute; inset:0; opacity:0; transition: opacity 1s ease; }
    .book.active .book-cover { opacity: 1; }
    
    .book-cover img { width:100%; height:100%; object-fit:cover; filter: brightness(0.7); }

    /* =========================
       📖 READER OVERLAY
    ========================= */
    #reader {
      position:fixed; inset:0; background:rgba(0,0,0,0.95);
      display:none; flex-direction:column; align-items:center; justify-content:center;
      z-index:1000; padding:20px;
    }
    #readerContent { max-width:600px; line-height:1.8; color:#f5e6c8; font-size:1.1rem; }
    
    .controls { margin-top:20px; }
    button { padding:10px 20px; background:#2a2015; color:#ffd700; border:1px solid #ffd700; cursor:pointer; margin:5px; }
  </style>
</head>
<body>

  <h1>XAVIER-OS ARCHIVES</h1>
  <div id="stats">Initializing System...</div>
  
  <div id="rows"></div>

  <div id="reader">
    <div id="readerContent"></div>
    <div class="controls">
      <button onclick="prevPage()">PREVIOUS</button>
      <button onclick="nextPage()">NEXT</button>
      <button onclick="closeReader()" style="color:red;">CLOSE ARCHIVE</button>
    </div>
  </div>

  <audio id="whisper" src="https://www.soundjay.com/misc/sounds/wind-chime-1.mp3"></audio>

  <script>
    /* =========================
       🌐 CONFIG
    ========================= */
    const AI_KEYS = { GEMINI: "AIzaSyB0I7AlW5MlEE73NvXgJ-G_d8Ie8h23okI" };
    const coreBooks = ["Vampire System", "Gods Eye", "My Dragonic System", "Shadow Blade", "Legendary Beast Tamer"];
    let player = { level: 1, xp: 0 };
    let currentBook = null;
    let currentPage = 0;
    let currentPages = [];

    /* =========================
       📚 LIBRARY LOGIC (DEAD START)
    ========================= */
    function initLibrary() {
      const container = document.getElementById("rows");
      coreBooks.forEach(name => {
        container.appendChild(createBookElement(name));
      });
      // Add a few generated ones
      for(let i=0; i<5; i++) {
        container.appendChild(createBookElement("Lost Archive " + i));
      }
    }

    function createBookElement(name) {
      const el = document.createElement("div");
      el.className = "book dead"; // Starts DEAD
      el.innerHTML = `
        <div class="placeholder"></div>
        <div class="book-title">${name}</div>
      `;
      
      el.onclick = () => activateBook(el, name);
      return el;
    }

    /* =========================
       ⚡ ACTIVATION (COMING TO LIFE)
    ========================= */
    async function activateBook(el, name) {
      if (el.classList.contains("active")) {
        openReader(name);
        return;
      }

      // 1. Visual Wakeup
      el.classList.remove("dead");
      el.classList.add("active");
      document.getElementById("whisper").play().catch(()=>{});

      // 2. Fetch Assets only when clicked
      const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(name + " dark fantasy cinematic book cover")}`;
      
      el.innerHTML = `
        <div class="book-cover">
          <img src="${imgUrl}" alt="${name}" onload="this.parentElement.style.opacity=1">
        </div>
        <div class="book-title" style="position:absolute; bottom:10px; width:100%; color:gold; background:rgba(0,0,0,0.6);">${name}</div>
      `;

      // 3. Open Reader
      setTimeout(() => openReader(name), 800);
    }

    /* =========================
       🧠 AI STORY ENGINE
    ========================= */
    async function openReader(title) {
      document.getElementById("reader").style.display = "flex";
      document.getElementById("readerContent").innerHTML = "Awakening Archives...";
      
      const storyText = await geminiAI(title);
      currentPages = storyText.match(/.{1,500}/g) || [storyText];
      currentPage = 0;
      renderPage();
    }

    async function geminiAI(title) {
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${AI_KEYS.GEMINI}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: [{ parts: [{ text: `Write a dark fantasy intro for the book "${title}".` }] }] })
        });
        const data = await res.json();
        return data.candidates[0].content.parts[0].text;
      } catch (e) {
        return "The connection to the archive is weak, but the power remains...";
      }
    }

    function renderPage() {
      document.getElementById("readerContent").innerHTML = `<p>${currentPages[currentPage]}</p>`;
      // Optional: speak(currentPages[currentPage]);
    }

    function nextPage() {
      if (currentPage < currentPages.length - 1) {
        currentPage++;
        renderPage();
        player.xp += 10;
        updateStats();
      }
    }

    function prevPage() {
      if (currentPage > 0) {
        currentPage--;
        renderPage();
      }
    }

    function closeReader() {
      document.getElementById("reader").style.display = "none";
    }

    function updateStats() {
      document.getElementById("stats").innerText = `🔥 RANK: LEVEL ${player.level} | ⚡ ESSENCE: ${player.xp} XP`;
    }

    // Start System
    initLibrary();
    updateStats();

  </script>
</body>
</html>
